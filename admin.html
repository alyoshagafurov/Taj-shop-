<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TAJSHOP — админ-панель</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body class="admin-body">

  <!-- Вход в админку -->
  <div class="adlogin" id="adminLogin">
    <div class="adlogin__card">
      <div class="logo"><span class="logo__mark"><span class="logo__t">T</span><span class="logo__s">S</span></span><span class="logo__word">TAJ<b>SHOP</b></span></div>
      <h2>Админ-панель</h2>
      <p>Войдите, чтобы управлять магазином</p>
      <div class="field"><label>Пароль</label><input id="adPass" type="password" placeholder="Введите пароль" value="admin"></div>
      <div class="adlogin__err" id="adErr" hidden></div>
      <button class="btn btn--primary btn--block btn--lg" id="adLoginBtn">Войти</button>
      <p class="adlogin__hint">Демо-пароль: <b>admin</b></p>
      <a href="index.html" class="adlogin__back"><i class="ti ti-arrow-left"></i> Вернуться в магазин</a>
    </div>
  </div>

  <!-- Оболочка админки -->
  <div class="admin-shell" id="adminShell" hidden>
    <aside class="aside">
      <div class="aside__logo"><span class="logo__mark"><span class="logo__t">T</span><span class="logo__s">S</span></span><span>Админ</span></div>
      <nav class="aside__nav" id="asideNav">
        <button class="aside__item active" data-view="dashboard"><i class="ti ti-layout-dashboard"></i> Дашборд</button>
        <button class="aside__item" data-view="products"><i class="ti ti-shirt"></i> Товары</button>
        <button class="aside__item" data-view="orders"><i class="ti ti-package"></i> Заказы</button>
        <button class="aside__item" data-view="promos"><i class="ti ti-rosette-discount"></i> Акции</button>
        <button class="aside__item" data-view="customers"><i class="ti ti-users"></i> Клиенты</button>
      </nav>
      <div class="aside__foot">
        <a class="aside__item" href="index.html" target="_blank"><i class="ti ti-external-link"></i> Открыть магазин</a>
        <button class="aside__item" id="adLogout"><i class="ti ti-logout"></i> Выйти</button>
      </div>
    </aside>

    <main class="admin-main">
      <header class="admin-top">
        <button class="icon-btn admin-burger" id="adBurger"><i class="ti ti-menu-2"></i></button>
        <div><h1 class="admin-title" id="viewTitle">Дашборд</h1><p class="admin-sub" id="viewSub"></p></div>
        <div class="admin-top__actions" id="topActions"></div>
      </header>
      <div class="admin-view" id="adminView"></div>
    </main>
  </div>

  <!-- Модалка редактора товара -->
  <div class="modal" id="prodModal"><div class="modal__inner modal__inner--md" id="prodModalInner"></div></div>
  <div class="overlay" id="adOverlay"></div>
  <div class="toast-wrap" id="toastWrap"></div>

  <script src="data.js"></script>
  <script src="store.js"></script>
  <script src="admin.js"></script>
</body>
</html>
